syntax = "proto3";
package experiments;

import "experiments/proto/common.proto";

message TruncationParameters {
  int32 n = 1;
  double noise_rate = 2;
  double a_sq = 3;
  repeated double epsilon_range = 4;
  repeated int32 verifier_sample_range = 5;
  int32 num_trials = 6;
  int32 qfs_shots = 7;
}

message TruncationExperimentResult {
  ExperimentMetadata metadata = 1;
  TruncationParameters parameters = 2;
  repeated TrialResult trials = 3;
}
