syntax = "proto3";
package experiments;

import "experiments/proto/common.proto";

message ScalingParameters {
  repeated int32 n_range = 1;
  int32 num_trials = 2;
  double epsilon = 3;
  double delta = 4;
  int32 qfs_shots = 5;
  int32 classical_samples_prover = 6;
  int32 classical_samples_verifier = 7;
}

message ScalingExperimentResult {
  ExperimentMetadata metadata = 1;
  ScalingParameters parameters = 2;
  repeated TrialResult trials = 3;
}
