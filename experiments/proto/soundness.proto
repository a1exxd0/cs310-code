syntax = "proto3";
package experiments;

import "experiments/proto/common.proto";

message SoundnessParameters {
  repeated int32 n_range = 1;
  int32 num_trials = 2;
  double epsilon = 3;
  repeated string strategies = 4;
}

message SoundnessExperimentResult {
  ExperimentMetadata metadata = 1;
  SoundnessParameters parameters = 2;
  repeated TrialResult trials = 3;
}
